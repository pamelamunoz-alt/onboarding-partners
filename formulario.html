<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de curso | PedidosYa Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --rosa: #FA0050;
      --celeste: #61C8FA;
      --blanco: #FFFFFF;
      --gris-fondo: #F7F7F7;
      --negro: #111217;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Poppins", sans-serif;
      background-color: var(--gris-fondo);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 {
      color: var(--rosa);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      color: var(--negro);
      text-align: center;
      margin-bottom: 25px;
      max-width: 600px;
    }

    form {
      background-color: var(--blanco);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      padding: 30px 40px;
      width: 100%;
      max-width: 500px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--negro);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: "Poppins", sans-serif;
    }

    /* AUTOCOMPLETE */
    .autocomplete-wrapper {
      position: relative;
      width: 100%;
    }

    #autocomplete-list {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      z-index: 9999;
      display: none;
    }

    #autocomplete-list div {
      padding: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #autocomplete-list div:hover {
      background: #ffe3ef;
    }

    button {
      background-color: var(--rosa);
      color: var(--blanco);
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      font-size: 1rem;
      margin-top: 20px;
    }

    button:hover {
      background-color: #ff3377;
      transform: scale(1.03);
    }

    #mensaje {
      margin-top: 20px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>¡Bienvenido al curso de Autogestión!</h1>
  <p>Aprende a gestionar tu negocio de forma eficiente y potenciar el crecimiento de tu local dentro de la plataforma PedidosYa.</p>

  <form id="inicioForm">
    
    <label>Nombre del local</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="local" name="local" placeholder="Escribe el nombre del local..." required autocomplete="off">
      <div id="autocomplete-list"></div>
    </div>

    <label>Nombre del participante</label>
    <input type="text" id="nombre" name="nombre" required>

    <label>Número de teléfono</label>
    <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{8}">

    <button type="submit">Iniciar curso</button>
    <div id="mensaje"></div>
  </form>

<script>

  // 🔹 URL que trae la lista de partners
  const partnersURL = "https://script.google.com/macros/s/AKfycbwPPOYTOCG5UFx_yW7OzeyWfrT4MfdY5GaWVMcKchm04N2xbbAwN60PjAd0Gl7nLlJa/exec";

  // 🔹 URL que registra el inicio (la que ya usabas)
  const inicioURL = "https://script.google.com/macros/s/AKfycbzgowHIC9STHoqRm6uMQSqSe13-EBWKBlSHIxSghJreHeEZTXL9Cgz2N_60nnkDGA--/exec";

  const form = document.getElementById("inicioForm");
  const mensaje = document.getElementById("mensaje");
  const localInput = document.getElementById("local");
  const list = document.getElementById("autocomplete-list");

  let partners = [];

  // Cargar lista de partners
  fetch(`${partnersURL}?action=getPartners`)
    .then(res => res.json())
    .then(data => {
      partners = data.partners || [];
    });

  // Autocomplete
  localInput.addEventListener("input", () => {
    const val = localInput.value.toLowerCase();
    list.innerHTML = "";

    if (val.length < 2) {
      list.style.display = "none";
      return;
    }

    const matches = partners
      .filter(p => p.toLowerCase().includes(val))
      .slice(0, 12);

    if (!matches.length) {
      list.style.display = "none";
      return;
    }

    matches.forEach(p => {
      const div = document.createElement("div");
      div.textContent = p;
      div.onclick = () => {
        localInput.value = p;
        list.style.display = "none";
      };
      list.appendChild(div);
    });

    list.style.display = "block";
  });

  // Cerrar lista si se hace click fuera
  document.addEventListener("click", e => {
    if (!e.target.closest(".autocomplete-wrapper")) {
      list.style.display = "none";
    }
  });

  // Submit
  form.addEventListener("submit", e => {  
    e.preventDefault();

    mensaje.textContent = "Registrando inicio...";
    mensaje.style.color = "#FA0050";

    const formData = new FormData(form);
    formData.append("action", "inicio");

    fetch(inicioURL, { method: "POST", body: formData })
      .then(() => {
        mensaje.textContent = "Inicio registrado con éxito";
        mensaje.style.color = "green";

        localStorage.setItem("partner_nombre", formData.get("nombre"));
        localStorage.setItem("partner_local", formData.get("local"));
        localStorage.setItem("partner_tel", formData.get("telefono"));
        localStorage.setItem("curso_nombre", formData.get("nombre"));
        localStorage.setItem("curso_local", formData.get("local"));

        setTimeout(() => {
          window.location.href = "curso.html";
        }, 1500);
      })
      .catch(() => {
        mensaje.textContent = "Ocurrió un error al registrar el inicio.";
        mensaje.style.color = "red";
      });
  });

</script>

</body>
</html>
